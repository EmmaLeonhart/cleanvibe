# Deploys the cleanvibe site (pages/) to GitHub Pages via Actions.
# Custom domain cleanvibe.emmaleonhart.com is pinned by pages/CNAME.
# Pages Source is already configured as "GitHub Actions" on this repo.

name: pages

on:
  push:
    branches: [master]
    paths:
      - "pages/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - id: deployment
        uses: actions/deploy-pages@v4
